<p>actualiza-component works!</p>
<div class="container">
    <div class="col">
        <h1>{{titulo}}</h1>
    </div><br>
    <form class="form-group row" (ngSubmit)="accion_empleado()">
        <div class="form-group col-md-3">
            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" placeholder="Digite nombres" class="form-control"
                [(ngModel)]="cuadroNombre">
        </div>
        <div class="form-group col-md-3">
            <label for="nombre">Apellidos:</label>
            <input type="text" name="apellidos" id="apellidos" placeholder="Digite apellidos" class="form-control"
                [(ngModel)]="cuadroApellido">
        </div>
        <div class="form-group col-md-3">
            <label for="cargo">Cargo:</label>
            <input type="text" name="cargo" id="cargo" placeholder="Digite cargo" class="form-control"
                [(ngModel)]="cuadroCargo">
        </div>
        <div class="form-group col-md-3">
            <label for="salario">Salario:</label>
            <input type="number" name="salario" id="salario" placeholder="Digite salario" class="form-control"
                [(ngModel)]="cuadroSalario">
        </div>
        <div class="col">
            <button type="submit" class="btn btn-warning">Actualizar Empleado</button>
            <!--<button type="button" class="btn btn-danger" (click)="eliminar_empleado()">Eliminar Empleado</button>-->
        </div>
    </form>
</div>
