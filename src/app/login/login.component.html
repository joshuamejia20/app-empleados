<div class="m-5">
    <form class="form-group row" #miFormulario="ngForm" (ngSubmit)="login(miFormulario)">
        <div class="form-group col-md-12">
            <h3 class="text-center">Login</h3>
        </div>
        <div class="form-group col-md-12">
            <input type="email" name="email" placeholder="Ingrese su email" class="form-control" ngModel>
        </div>
        <div class="form-group col-md-12">
            <input type="password" name="password" placeholder="Ingrese clave" class="form-control" ngModel>
        </div>
        <div class="form-group col-md-12">
            <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
        </div>
    </form>
</div>
